name: Generate wiki [wiki update]
on:
  push:
    branches:
    - 'wiki_gen'

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  decompile:
      name: decompile-models
      runs-on: windows-latest
      steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Setup venv
        run: python -m venv venv; venv\Scripts\pip.exe install -r requirements_decompile.txt
      
      - name: Clone ZR repo
        run: git clone https://github.com/artvin01/TF2-Zombie-Riot --depth 1
      
      - name: Download CLI mdl decompiler
        run: | 
          Invoke-Webrequest https://github.com/mrglaster/Source-models-decompiler-cmd/releases/download/Update/CrowbarDecompiler.1.1.zip -OutFile CrowbarDecompiler.1.1.zip
          Expand-Archive .\CrowbarDecompiler.1.1.zip .\

      - name: Decompile
        run: |
          venv\Scripts\python.exe modules\weapon-decompile.py

      - name: Upload decompiled model data
        uses: actions/upload-artifact@v7
        with:
          path: decompiled/
          name: decompiled_models
  build:
    needs: decompile
    name: generate-pages
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install prerequisites (SMD=>OBJ conversion, icons)
      run: |
        sudo apt-get install libassimp-dev -y --allow-downgrades --allow-remove-essential --allow-change-held-packages

    - name: Setup venv
      run: python -m venv venv; ./venv/bin/pip install -r requirements.txt
    
    - name: Clone ZR repo
      run: git clone https://github.com/artvin01/TF2-Zombie-Riot --depth 1

    - name: Fetch decompiled model data
      uses: actions/download-artifact@v8
      with:
        path: decompiled/
        name: decompiled_models
    
    - name: Parse ZR repo code
      env:
        EGL_MESA_device_software: 1
      run: ./venv/bin/python main.py
    
    - name: Upload static files as artifact
      id: deployment
      uses: actions/upload-pages-artifact@v4
      with:
        path: gh-pages/

  deploy:
    name: deploy-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} 
    permissions:
      pages: write
      id-token: write
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5